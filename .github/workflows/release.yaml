name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  TURBO_REMOTE_ONLY: 'true'
  TURBO_TEAM: gigadrive
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch git tags
        run: git fetch origin 'refs/tags/*:refs/tags/*'

      - name: Setup
        uses: ./.github/actions/setup
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (OIDC trusted publishing)
        run: npm install -g npm@11.5.1

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm ci:version
          publish: pnpm ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Set latest Release to `gigadrive`
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const script = require('./scripts/update-latest-release.cjs')
            await script({ github, context })

  summary:
    name: Summary (release)
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 5
    if: always()
    needs:
      - release
    permissions:
      contents: read
    steps:
      - name: Check all jobs
        env:
          RELEASE: ${{ needs.release.result }}
        run: |
          if [[ "$RELEASE" != "success" ]]; then
            echo "Release job failed or was cancelled."
            exit 1
          fi
          echo "All jobs passed."
