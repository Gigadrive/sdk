name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TEAM: gigadrive
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  test:
    name: Tests
    runs-on: blacksmith-4vcpu-ubuntu-2204
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

      - name: Tests
        run: pnpm test

  lint:
    name: ESLint
    runs-on: blacksmith-4vcpu-ubuntu-2204
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Restore ESLint cache
        uses: useblacksmith/cache@v5
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('eslint.config.*', '.eslintrc*', 'pnpm-lock.yaml') }}
          restore-keys: |
            eslint-${{ runner.os }}-

      - name: ESLint
        run: pnpm lint

  format:
    name: Prettier
    runs-on: blacksmith-4vcpu-ubuntu-2204
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Prettier
        run: pnpm format

  typecheck:
    name: Type Check
    runs-on: blacksmith-4vcpu-ubuntu-2204
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Type Check
        run: pnpm typecheck

  summary:
    name: Summary (CI)
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 5
    if: always()
    needs: [test, lint, format, typecheck]
    permissions:
      contents: read
    steps:
      - name: Check all jobs
        env:
          TEST: ${{ needs.test.result }}
          LINT: ${{ needs.lint.result }}
          FORMAT: ${{ needs.format.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
        run: |
          if [[ "$TEST" != "success" || "$LINT" != "success" || "$FORMAT" != "success" || "$TYPECHECK" != "success" ]]; then
            echo "One or more jobs failed or were cancelled."
            exit 1
          fi
          echo "All jobs passed."
